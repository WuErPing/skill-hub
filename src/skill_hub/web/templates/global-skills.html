<div class="max-w-6xl mx-auto">
    <div class="mb-8">
        <h2 class="text-2xl font-bold text-gray-900">{{ _("Global Skills Manager") }}</h2>
        <p class="mt-2 text-gray-600">{{ _("Find, query, and delete global skills across all adapters") }}</p>
    </div>

    <!-- Search and Filter Section -->
    <div class="bg-white rounded-lg shadow p-6 mb-6">
        <div class="flex gap-4 items-end">
            <div class="flex-1">
                <label class="block text-sm font-medium text-gray-700 mb-2">{{ _("Search Skills") }}</label>
                <input type="text" id="searchQuery" placeholder="{{ _('Enter skill name or description...') }}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>
            <button onclick="loadGlobalSkills()"
                    class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                {{ _("Search") }}
            </button>
            <button onclick="loadGlobalSkills()"
                    class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                {{ _("Refresh") }}
            </button>
        </div>
    </div>

    <!-- Results Section -->
    <div id="skillsResults" class="bg-white rounded-lg shadow">
        <div class="p-6 text-center text-gray-500">
            {{ _("Click 'Search' to load global skills") }}
        </div>
    </div>
</div>

<script>
    // Load global skills on page load
    document.addEventListener('DOMContentLoaded', function() {
        loadGlobalSkills();
    });

    function loadGlobalSkills() {
        const query = document.getElementById('searchQuery').value;
        const resultsDiv = document.getElementById('skillsResults');
        
        resultsDiv.innerHTML = '<div class="p-6 text-center"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div><p class="mt-2 text-gray-500">{{ _("Loading...") }}</p></div>';
        
        const url = '/api/skills' + (query ? '?query=' + encodeURIComponent(query) : '');
        
        fetch(url)
            .then(response => response.json())
            .then(data => {
                if (data.success && data.skills.length > 0) {
                    renderSkillsTable(data.skills);
                } else {
                    resultsDiv.innerHTML = '<div class="p-6 text-center text-gray-500">{{ _("No global skills found") }}</div>';
                }
            })
            .catch(error => {
                resultsDiv.innerHTML = '<div class="p-6 text-center text-red-500">{{ _("Error loading skills: ") }}' + error.message + '</div>';
            });
    }

    function renderSkillsTable(skills) {
        const resultsDiv = document.getElementById('skillsResults');
        
        let html = `
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">{{ _("Skill Name") }}</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">{{ _("Description") }}</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">{{ _("Path") }}</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">{{ _("Actions") }}</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
        `;
        
        skills.forEach(skill => {
            const description = skill.description.length > 80 
                ? skill.description.substring(0, 80) + '...' 
                : skill.description;
            
            html += `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm font-medium text-gray-900">${escapeHtml(skill.name)}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm text-gray-600">${escapeHtml(description)}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm text-gray-500 font-mono text-xs">${escapeHtml(skill.path)}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <button onclick="confirmDelete('${escapeHtml(skill.name)}')"
                                class="text-red-600 hover:text-red-900 mr-4">
                            {{ _("Delete") }}
                        </button>
                        <button onclick="viewSkill('${escapeHtml(skill.path)}')"
                                class="text-blue-600 hover:text-blue-900">
                            {{ _("View") }}
                        </button>
                    </td>
                </tr>
            `;
        });
        
        html += `
                    </tbody>
                </table>
            </div>
            <div class="bg-gray-50 px-6 py-4 border-t border-gray-200">
                <p class="text-sm text-gray-700">
                    {{ _("Showing") }} <span class="font-medium">${skills.length}</span> {{ _("global skills") }}
                </p>
            </div>
        `;
        
        resultsDiv.innerHTML = html;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function confirmDelete(skillName) {
        if (confirm('{{ _("Are you sure you want to delete the global skill") }} "' + skillName + '"?\n\n{{ _("This action cannot be undone!") }}')) {
            deleteSkill(skillName);
        }
    }

    function deleteSkill(skillName) {
        fetch(`/api/skills/${encodeURIComponent(skillName)}?force=true`, {
            method: 'DELETE'
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                showToast('{{ _("Skill deleted successfully") }}', 'success');
                loadGlobalSkills(); // Refresh the list
            } else {
                showToast('{{ _("Error: ") }}' + data.message, 'error');
            }
        })
        .catch(error => {
            showToast('{{ _("Error deleting skill: ") }}' + error.message, 'error');
        });
    }

    function viewSkill(path) {
        // Open in new tab or implement modal preview
        window.open(`/preview?path=${encodeURIComponent(path)}`, '_blank');
    }
</script>
