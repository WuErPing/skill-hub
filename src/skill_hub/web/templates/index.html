<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>skill-hub</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cpolygon points='256,110 336,156 336,248 256,294 176,248 176,156' fill='%232563eb'/%3E%3Ccircle cx='256' cy='202' r='28' fill='white'/%3E%3Ccircle cx='256' cy='202' r='14' fill='%232563eb'/%3E%3Cline x1='256' y1='110' x2='256' y2='64' stroke='%232563eb' stroke-width='8' stroke-linecap='round'/%3E%3Cline x1='336' y1='156' x2='384' y2='128' stroke='%232563eb' stroke-width='8' stroke-linecap='round'/%3E%3Cline x1='336' y1='248' x2='384' y2='276' stroke='%232563eb' stroke-width='8' stroke-linecap='round'/%3E%3Ccircle cx='256' cy='64' r='18' fill='%232563eb'/%3E%3Ccircle cx='384' cy='128' r='18' fill='%232563eb'/%3E%3Ccircle cx='384' cy='276' r='18' fill='%232563eb'/%3E%3Cline x1='256' y1='294' x2='256' y2='340' stroke='%23cbd5e1' stroke-width='6' stroke-linecap='round' stroke-dasharray='10,6'/%3E%3Cline x1='176' y1='248' x2='128' y2='276' stroke='%23cbd5e1' stroke-width='6' stroke-linecap='round' stroke-dasharray='10,6'/%3E%3Cline x1='176' y1='156' x2='128' y2='128' stroke='%23cbd5e1' stroke-width='6' stroke-linecap='round' stroke-dasharray='10,6'/%3E%3Ccircle cx='256' cy='340' r='14' fill='none' stroke='%23cbd5e1' stroke-width='5'/%3E%3Ccircle cx='128' cy='276' r='14' fill='none' stroke='%23cbd5e1' stroke-width='5'/%3E%3Ccircle cx='128' cy='128' r='14' fill='none' stroke='%23cbd5e1' stroke-width='5'/%3E%3Ccircle cx='256' cy='64' r='6' fill='white'/%3E%3Ccircle cx='384' cy='128' r='6' fill='white'/%3E%3Ccircle cx='384' cy='276' r='6' fill='white'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 1000; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
<div class="max-w-[1100px] mx-auto p-6">

  <!-- Header -->
  <header class="flex items-center justify-between mb-4">
    <div class="flex items-center gap-2">
      <svg width="28" height="28" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" class="shrink-0">
        <polygon points="256,110 336,156 336,248 256,294 176,248 176,156" fill="#2563eb"/>
        <circle cx="256" cy="202" r="28" fill="white"/>
        <circle cx="256" cy="202" r="14" fill="#2563eb"/>
        <line x1="256" y1="110" x2="256" y2="64" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
        <line x1="336" y1="156" x2="384" y2="128" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
        <line x1="336" y1="248" x2="384" y2="276" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
        <circle cx="256" cy="64" r="18" fill="#2563eb"/>
        <circle cx="384" cy="128" r="18" fill="#2563eb"/>
        <circle cx="384" cy="276" r="18" fill="#2563eb"/>
        <line x1="256" y1="294" x2="256" y2="340" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round" stroke-dasharray="10,6"/>
        <line x1="176" y1="248" x2="128" y2="276" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round" stroke-dasharray="10,6"/>
        <line x1="176" y1="156" x2="128" y2="128" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round" stroke-dasharray="10,6"/>
        <circle cx="256" cy="340" r="14" fill="none" stroke="#cbd5e1" stroke-width="5"/>
        <circle cx="128" cy="276" r="14" fill="none" stroke="#cbd5e1" stroke-width="5"/>
        <circle cx="128" cy="128" r="14" fill="none" stroke="#cbd5e1" stroke-width="5"/>
        <circle cx="256" cy="64" r="6" fill="white"/>
        <circle cx="384" cy="128" r="6" fill="white"/>
        <circle cx="384" cy="276" r="6" fill="white"/>
      </svg>
      <h1 class="text-2xl font-bold">skill-hub</h1>
    </div>
    <div class="flex gap-2">
      <button onclick="loadSkills()" class="px-3 py-1.5 rounded border border-gray-300 bg-white text-sm hover:bg-gray-50 cursor-pointer">刷新</button>
      <button onclick="toggleAddRepo()" class="px-3 py-1.5 rounded border border-gray-300 bg-white text-sm hover:bg-gray-50 cursor-pointer">添加仓库</button>
    </div>
  </header>

  <!-- Update banner -->
  <div id="update-banner" class="hidden bg-yellow-50 border border-yellow-400 rounded-md p-3 mb-4 text-sm">
    检测到更新可用
    <button onclick="syncAndReload()" class="ml-3 px-3 py-1 rounded border border-gray-300 bg-white text-sm hover:bg-gray-50 cursor-pointer">刷新</button>
  </div>

  <!-- Add repo form -->
  <div id="add-repo-form" class="hidden bg-white rounded-lg p-4 mb-4 border border-gray-300">
    <div class="flex gap-2 items-center">
      <input type="text" id="repo-url" placeholder="https://github.com/owner/repo 或 ~/local/path"
        oninput="onRepoUrlInput()"
        class="w-[300px] px-2.5 py-1.5 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
      <input type="text" id="repo-branch" placeholder="main" value="main"
        class="w-[100px] px-2.5 py-1.5 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
    </div>
    <div class="flex gap-2 mt-3">
      <button onclick="addRepo()" class="px-3 py-1.5 rounded border border-green-600 text-green-700 text-sm hover:bg-green-50 cursor-pointer">添加</button>
      <button onclick="toggleAddRepo()" class="px-3 py-1.5 rounded border border-gray-300 bg-white text-sm hover:bg-gray-50 cursor-pointer">取消</button>
    </div>
  </div>

  <!-- Main layout: sidebar + content -->
  <div class="grid grid-cols-[220px_1fr] gap-5 mb-4">
    <div id="sidebar" class="bg-white border border-gray-300 rounded-lg py-3 max-h-[calc(100vh-160px)] overflow-y-auto"></div>
    <div class="min-w-0">
      <div id="skills-container"></div>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast" class="toast hidden rounded-md px-4 py-3 text-sm border"></div>

<script>
  let selectedRepo = null;
  let allSkills = [];
  let repoMeta = {};

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast rounded-md px-4 py-3 text-sm border ' +
      (type === 'success'
        ? 'bg-green-50 text-green-800 border-green-300'
        : 'bg-red-50 text-red-800 border-red-300');
    setTimeout(() => t.className = 'toast hidden', 3000);
  }

  async function checkUpdateStatus() {
    try {
      const resp = await fetch('/api/update-status');
      const data = await resp.json();
      if (data.hasUpdates) {
        document.getElementById('update-banner').classList.remove('hidden');
      }
    } catch (e) {}
  }

  async function syncAndReload() {
    await fetch('/api/repos/sync', { method: 'POST' });
    document.getElementById('update-banner').classList.add('hidden');
    await loadSkills();
    showToast('同步完成');
  }

  async function syncOneRepo(repoName) {
    const info = repoMeta[repoName] || {};
    if (!info.hasRemoteUpdates) return;
    if (!confirm(`同步 ${repoName} 到最新版本？`)) return;
    await fetch('/api/repos/sync', { method: 'POST' });
    document.getElementById('update-banner').classList.add('hidden');
    await loadSkills();
    showToast(`${repoName} 同步完成`);
  }

  function toggleAddRepo() {
    document.getElementById('add-repo-form').classList.toggle('hidden');
  }

  function isLocalPath(url) {
    return url.startsWith('~') || url.startsWith('/') || url.startsWith('.');
  }

  function onRepoUrlInput() {
    const url = document.getElementById('repo-url').value.trim();
    const branchInput = document.getElementById('repo-branch');
    branchInput.style.display = isLocalPath(url) ? 'none' : '';
  }

  async function addRepo() {
    const url = document.getElementById('repo-url').value.trim();
    const branch = document.getElementById('repo-branch').value.trim() || 'main';
    if (!url) return;
    const payload = isLocalPath(url) ? { url } : { url, branch };
    const resp = await fetch('/api/repos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    if (resp.ok) {
      showToast(data.message || '仓库添加成功');
      toggleAddRepo();
      document.getElementById('repo-url').value = '';
      onRepoUrlInput();
      await loadSkills();
    } else {
      showToast(data.error || '添加失败', 'error');
    }
  }

  async function loadSkills() {
    const [skillsResp, reposResp] = await Promise.all([
      fetch('/api/skills'),
      fetch('/api/repos'),
    ]);
    allSkills = await skillsResp.json();
    const repos = await reposResp.json();
    repoMeta = {};
    for (const r of repos) {
      repoMeta[r.name] = { hasRemoteUpdates: r.hasRemoteUpdates, isLocal: r.isLocal };
    }

    const repoNames = [...new Set(allSkills.map(s => s.repoName))];
    if (selectedRepo && !repoNames.includes(selectedRepo)) {
      selectedRepo = null;
    }
    if (!selectedRepo && repoNames.length > 0) {
      selectedRepo = repoNames[0];
    }

    renderSidebar();
    renderSkills();
  }

  function renderSidebar() {
    const sidebar = document.getElementById('sidebar');
    const remoteRepos = [];
    const localRepos = [];
    const allRepoNames = new Set([
      ...allSkills.map(s => s.repoName),
      ...Object.keys(repoMeta),
    ]);

    for (const name of allRepoNames) {
      const meta = repoMeta[name] || {};
      if (meta.isLocal) {
        localRepos.push({ name });
      } else {
        remoteRepos.push({ name });
      }
    }

    if (remoteRepos.length === 0 && localRepos.length === 0) {
      sidebar.innerHTML = '<div class="px-4 py-6 text-gray-500 text-sm text-center">暂无仓库</div>';
      return;
    }

    let html = '';

    if (remoteRepos.length > 0) {
      html += '<div class="text-[11px] font-bold uppercase text-gray-500 px-4 pt-2 pb-1 tracking-wide">远端仓库</div>';
      for (const r of remoteRepos) {
        const meta = repoMeta[r.name] || {};
        const dotCls = meta.hasRemoteUpdates ? 'bg-yellow-400' : 'bg-green-600';
        const active = r.name === selectedRepo;
        const itemCls = active
          ? 'bg-blue-50 border-l-[3px] border-blue-500 font-semibold'
          : 'border-l-[3px] border-transparent hover:bg-gray-100';
        html += `<div class="flex items-center gap-2 px-4 py-[7px] cursor-pointer text-sm ${itemCls}" onclick="selectRepo('${escAttr(r.name)}')">
          <span class="w-2 h-2 rounded-full ${dotCls} shrink-0"></span>
          <span class="truncate">${escHtml(r.name)}</span>
        </div>`;
      }
    }

    if (localRepos.length > 0) {
      html += '<div class="text-[11px] font-bold uppercase text-gray-500 px-4 pt-3 pb-1 tracking-wide">本地仓库</div>';
      for (const r of localRepos) {
        const active = r.name === selectedRepo;
        const itemCls = active
          ? 'bg-blue-50 border-l-[3px] border-blue-500 font-semibold'
          : 'border-l-[3px] border-transparent hover:bg-gray-100';
        html += `<div class="flex items-center gap-2 px-4 py-[7px] cursor-pointer text-sm ${itemCls}" onclick="selectRepo('${escAttr(r.name)}')">
          <span class="w-2 h-2 rounded-full bg-gray-400 shrink-0"></span>
          <span class="truncate">${escHtml(r.name)}</span>
        </div>`;
      }
    }

    sidebar.innerHTML = html;
  }

  function selectRepo(name) {
    selectedRepo = name;
    renderSidebar();
    renderSkills();
  }

  function statusBadge(status) {
    const map = {
      '已安装': 'bg-green-100 text-green-800',
      '未安装': 'bg-gray-200 text-gray-500',
      '不一致': 'bg-yellow-100 text-yellow-800 border border-yellow-400',
      '部分安装': 'bg-blue-100 text-blue-800',
    };
    return map[status] || 'bg-gray-200 text-gray-500';
  }

  function renderSkills() {
    const container = document.getElementById('skills-container');

    if (!selectedRepo) {
      container.innerHTML = '<div class="text-gray-500 text-center py-10 text-sm">暂无 skills。请先添加仓库。</div>';
      return;
    }

    const items = allSkills.filter(s => s.repoName === selectedRepo);
    const repoInfo = repoMeta[selectedRepo] || {};
    const isLocal = repoInfo.isLocal;
    const hasUpdate = repoInfo.hasRemoteUpdates;

    const dotCls = hasUpdate ? 'bg-yellow-400' : 'bg-green-600';
    const dotTitle = hasUpdate ? '有远端更新可用，点击同步' : (isLocal ? '本地路径' : '已与远端同步');
    const escapedRepo = selectedRepo.replace(/'/g, "\\'");
    const dotClick = hasUpdate ? `onclick="event.stopPropagation(); syncOneRepo('${escapedRepo}')" class="cursor-pointer"` : '';

    let html = `<div>
      <div class="flex items-center gap-2 px-3 py-2 bg-gray-200 rounded-md text-sm font-semibold mb-2">
        <span class="w-2.5 h-2.5 rounded-full ${dotCls}" title="${dotTitle}" ${dotClick}></span>
        <span class="truncate">${escHtml(selectedRepo)}</span>
        <button onclick="removeRepo('${escapedRepo}')" class="ml-auto text-xs text-red-600 hover:underline cursor-pointer bg-transparent border-0 p-0.5">删除仓库</button>
      </div>`;

    if (items.length === 0) {
      html += '<p class="text-gray-500 text-sm px-3 py-2">此仓库中暂无 skills。</p>';
    } else {
      html += '<ul class="list-none pl-0">';
      for (const s of items) {
        const isInstalled = s.status === '已安装' || s.status === '不一致';
        const escapedName = s.name.replace(/'/g, "\\'");

        const claudeDot = s.inClaude
          ? (s.claudeMatchesSource ? 'bg-green-600' : 'bg-yellow-400 cursor-pointer')
          : 'bg-gray-300';
        const agentsDot = s.inAgents
          ? (s.agentsMatchesSource ? 'bg-green-600' : 'bg-yellow-400 cursor-pointer')
          : 'bg-gray-300';

        const claudeClick = s.inClaude && !s.claudeMatchesSource
          ? `onclick="installTo('${escapedName}', 'claude')" title="与源不同，点击更新"`
          : s.inClaude ? 'title="已安装 (最新)"' : 'title="未安装"';
        const agentsClick = s.inAgents && !s.agentsMatchesSource
          ? `onclick="installTo('${escapedName}', 'agents')" title="与源不同，点击更新"`
          : s.inAgents ? 'title="已安装 (最新)"' : 'title="未安装"';

        const statusLabel = s.status === '不一致' ? '部分已安装（有目录与源不同）' : s.status;

        html += `<li class="flex items-center gap-3 px-3 py-2 rounded-md hover:bg-gray-100 mb-1">
          <span class="flex-1 font-medium cursor-pointer hover:underline hover:text-blue-600" onclick="toggleMeta('${escapedName}', this)">${escHtml(s.name)}</span>
          <span class="w-2.5 h-2.5 rounded-full ${claudeDot}" ${claudeClick}></span>
          <span class="text-[11px] text-gray-500 mr-2">claude</span>
          <span class="w-2.5 h-2.5 rounded-full ${agentsDot}" ${agentsClick}></span>
          <span class="text-[11px] text-gray-500 mr-2">agents</span>
          <span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium ${statusBadge(s.status)}">${statusLabel}</span>
          ${isInstalled
            ? `<button onclick="uninstallSkill('${escapedName}')" class="px-3 py-1 rounded border border-red-500 text-red-600 text-xs hover:bg-red-50 cursor-pointer">卸载</button>`
            : `<button onclick="installSkill('${escapedName}')" class="px-3 py-1 rounded border border-green-600 text-green-700 text-xs hover:bg-green-50 cursor-pointer">安装</button>`
          }
        </li>
        <div id="meta-${escapedName}" class="hidden bg-white border border-gray-300 rounded-lg p-4 mx-3 mb-2 text-sm leading-relaxed"></div>`;
      }
      html += '</ul>';
    }

    html += '</div>';
    container.innerHTML = html;
  }

  async function installSkill(name) {
    const resp = await fetch(`/api/skills/${encodeURIComponent(name)}/install`, { method: 'POST' });
    const data = await resp.json();
    if (resp.ok) { showToast(data.message); await loadSkills(); }
    else { showToast(data.error || '安装失败', 'error'); }
  }

  async function installTo(name, target) {
    const targetLabel = target === 'claude' ? '~/.claude/skills' : '~/.agents/skills';
    if (!confirm(`从源更新 ${name} 到 ${targetLabel}？`)) return;
    const resp = await fetch(`/api/skills/${encodeURIComponent(name)}/install-to`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target }),
    });
    const data = await resp.json();
    if (resp.ok) { showToast(data.message); await loadSkills(); }
    else { showToast(data.error || '安装失败', 'error'); }
  }

  async function uninstallSkill(name) {
    const resp = await fetch(`/api/skills/${encodeURIComponent(name)}/uninstall`, { method: 'POST' });
    const data = await resp.json();
    if (resp.ok) { showToast(data.message); await loadSkills(); }
    else { showToast(data.error || '卸载失败', 'error'); }
  }

  async function toggleMeta(name, el) {
    const panel = document.getElementById(`meta-${name}`);
    if (!panel) return;
    if (!panel.classList.contains('hidden') && panel.innerHTML) {
      panel.classList.add('hidden');
      return;
    }
    const resp = await fetch(`/api/skills/${encodeURIComponent(name)}/meta`);
    const data = await resp.json();
    if (!resp.ok) {
      panel.innerHTML = `<div class="text-red-700">${data.error || '加载失败'}</div>`;
      panel.classList.remove('hidden');
      return;
    }
    const meta = data.meta;
    let html = '';
    const fields = [['description', '描述'], ['license', '协议'], ['compatibility', '兼容性']];
    for (const [key, label] of fields) {
      if (meta[key]) {
        html += `<div><span class="font-semibold text-gray-600">${label}:</span> ${escHtml(meta[key])}</div>`;
      }
    }
    const knownKeys = new Set(['name', 'description', 'license', 'compatibility']);
    for (const [key, val] of Object.entries(meta)) {
      if (!knownKeys.has(key) && val) {
        html += `<div><span class="font-semibold text-gray-600">${key}:</span> ${escHtml(String(val))}</div>`;
      }
    }
    if (data.body) {
      html += `<div class="mt-2 pt-2 border-t border-gray-200 whitespace-pre-wrap text-gray-500 text-xs max-h-48 overflow-y-auto">${escHtml(data.body)}</div>`;
    }
    if (!html) html = '<div class="text-red-700">无元数据</div>';
    panel.innerHTML = html;
    panel.classList.remove('hidden');
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function escAttr(str) {
    return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }

  async function removeRepo(name) {
    if (!confirm(`确定要删除仓库 ${name} 吗？`)) return;
    const resp = await fetch(`/api/repos/${encodeURIComponent(name)}`, { method: 'DELETE' });
    const data = await resp.json();
    if (resp.ok) {
      showToast(data.message);
      selectedRepo = null;
      await loadSkills();
    } else {
      showToast(data.error || '删除失败', 'error');
    }
  }

  loadSkills();
  checkUpdateStatus();
</script>
</body>
</html>
