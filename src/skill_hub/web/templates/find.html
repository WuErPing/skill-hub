<div>
    <h2 class="text-3xl font-bold text-gray-900 mb-6">AI Skill Finder</h2>
    
    <div class="bg-white rounded-lg shadow mb-6 p-6">
        <!-- Status indicator -->
        <div class="mb-4 p-3 {% if ai_enabled %}bg-green-50 border-l-4 border-green-500{% else %}bg-yellow-50 border-l-4 border-yellow-500{% endif %} rounded">
            <p class="text-sm {% if ai_enabled %}text-green-800{% else %}text-yellow-800{% endif %}">
                {% if ai_enabled %}
                <strong>Status:</strong> AI finder is enabled using <code class="px-1 bg-green-100 rounded">{{ ai_provider }}</code> provider
                {% else %}
                <strong>Status:</strong> AI finder is disabled. Enable it in configuration.
                {% endif %}
            </p>
        </div>

        <!-- Search form -->
        <form id="find-form">
            <div class="mb-4">
                <label for="query" class="block text-sm font-medium text-gray-700 mb-2">
                    Describe your problem or question
                </label>
                <textarea 
                    name="query" 
                    id="query"
                    rows="3"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none"
                    placeholder="e.g., How do I handle git merge conflicts? / I need help with React component testing..."
                    {% if not ai_enabled %}disabled{% endif %}
                ></textarea>
            </div>
            
            <div class="flex items-center gap-4 mb-4">
                <div>
                    <label for="top_k" class="block text-sm font-medium text-gray-700 mb-1">
                        Number of results
                    </label>
                    <select name="top_k" id="top_k" 
                            class="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            {% if not ai_enabled %}disabled{% endif %}>
                        <option value="3">3</option>
                        <option value="5" selected>5</option>
                        <option value="10">10</option>
                    </select>
                </div>
                
                <div class="flex-1"></div>
                
                <button type="submit" 
                        id="find-button"
                        class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                        {% if not ai_enabled %}disabled{% endif %}>
                    <span id="spinner" class="hidden">
                        <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                    <span id="button-text">Find Skills</span>
                </button>
            </div>
        </form>

        <!-- Streaming response container -->
        <div id="streaming-container" class="hidden mb-4">
            <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded">
                <div class="flex items-center gap-2">
                    <svg class="animate-spin h-5 w-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <p class="text-blue-800 font-medium">AI is analyzing your query...</p>
                </div>
                <div id="streaming-content" class="mt-3 text-sm text-gray-700 italic"></div>
            </div>
        </div>

        <!-- Results container -->
        <div id="results">
            <!-- Results will be loaded here -->
            <div class="text-center py-12 text-gray-400">
                <div class="text-5xl mb-4">🔍</div>
                <p>Enter a query above to find relevant skills</p>
            </div>
        </div>
    </div>
</div>

<script>
    let currentEventSource = null;

    document.getElementById('find-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const queryInput = document.getElementById('query');
        const topKSelect = document.getElementById('top_k');
        const button = document.getElementById('find-button');
        const spinner = document.getElementById('spinner');
        const buttonText = document.getElementById('button-text');
        const streamingContainer = document.getElementById('streaming-container');
        const streamingContent = document.getElementById('streaming-content');
        const resultsDiv = document.getElementById('results');
        
        const query = queryInput.value.trim();
        const topK = parseInt(topKSelect.value);
        
        if (!query) {
            alert('Please enter a query');
            return;
        }
        
        // Clear previous results and show streaming UI
        resultsDiv.innerHTML = '';
        streamingContainer.classList.remove('hidden');
        streamingContent.textContent = 'Connecting to AI service...';
        
        // Disable button and show spinner
        button.disabled = true;
        spinner.classList.remove('hidden');
        buttonText.textContent = 'Analyzing...';
        
        // Close any existing EventSource
        if (currentEventSource) {
            currentEventSource.close();
        }
        
        // Start streaming request
        const accumulatedContent = [];
        
        fetch('/api/ai/find-stream', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                query: query,
                top_k: topK
            })
        })
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            
            function read() {
                return reader.read().then(({ done, value }) => {
                    if (done) {
                        // Parse accumulated content and display results
                        const fullResponse = accumulatedContent.join('');
                        parseAndDisplayResults(fullResponse, resultsDiv);
                        
                        // Hide streaming UI
                        streamingContainer.classList.add('hidden');
                        
                        // Re-enable button
                        button.disabled = false;
                        spinner.classList.add('hidden');
                        buttonText.textContent = 'Find Skills';
                        return;
                    }
                    
                    const chunk = decoder.decode(value, { stream: true });
                    buffer += chunk;
                    
                    // Process SSE events in buffer
                    const events = buffer.split('\n\n');
                    buffer = events.pop() || ''; // Keep incomplete event in buffer
                    
                    events.forEach(event => {
                        const lines = event.split('\n');
                        let eventType = '';
                        let data = null;
                        
                        lines.forEach(line => {
                            if (line.startsWith('event: ')) {
                                eventType = line.slice(7);
                            } else if (line.startsWith('data: ')) {
                                try {
                                    data = JSON.parse(line.slice(6));
                                } catch (e) {
                                    // Ignore parse errors for incomplete data
                                }
                            }
                        });
                        
                        if (eventType === 'data' && data && data.chunk) {
                            accumulatedContent.push(data.chunk);
                            streamingContent.textContent = accumulatedContent.join('');
                        } else if (eventType === 'error' && data && data.message) {
                            showError(data.message, resultsDiv);
                            streamingContainer.classList.add('hidden');
                            button.disabled = false;
                            spinner.classList.add('hidden');
                            buttonText.textContent = 'Find Skills';
                        }
                    });
                    
                    return read();
                });
            }
            
            return read();
        })
        .catch(error => {
            console.error('Streaming error:', error);
            showError(`Failed to connect to AI service: ${error.message}`, resultsDiv);
            streamingContainer.classList.add('hidden');
            button.disabled = false;
            spinner.classList.add('hidden');
            buttonText.textContent = 'Find Skills';
        });
    });
    
    function parseAndDisplayResults(response, resultsDiv) {
        try {
            // Try to extract JSON from response
            const jsonMatch = response.match(/\[[\s\S]*\]/);
            if (!jsonMatch) {
                showError('No results found in response', resultsDiv);
                return;
            }
            
            const data = JSON.parse(jsonMatch[0]);
            
            if (!data || data.length === 0) {
                showNoResults(resultsDiv);
                return;
            }
            
            let html = `
                <h3 class="text-lg font-semibold mb-4">Found ${data.length} matching skills:</h3>
                <div class="space-y-4">
            `;
            
            // Note: The streaming response doesn't include full match objects
            // This is a simplified display - in production you'd want to structure
            // the streaming response differently
            html += `
                <div class="p-4 bg-green-50 border-l-4 border-green-500 rounded">
                    <p class="text-green-800"><strong>✓ Analysis complete!</strong></p>
                    <pre class="mt-2 text-sm text-green-700 whitespace-pre-wrap">${response}</pre>
                </div>
            `;
            
            html += '</div>';
            resultsDiv.innerHTML = html;
            
        } catch (e) {
            console.error('Failed to parse results:', e);
            // Display raw response
            let html = `
                <div class="p-4 bg-green-50 border-l-4 border-green-500 rounded">
                    <p class="text-green-800"><strong>✓ Analysis complete!</strong></p>
                    <pre class="mt-2 text-sm text-green-700 whitespace-pre-wrap">${response}</pre>
                </div>
            `;
            resultsDiv.innerHTML = html;
        }
    }
    
    function showError(message, resultsDiv) {
        resultsDiv.innerHTML = `
            <div class="p-4 bg-red-50 border-l-4 border-red-500 rounded">
                <p class="text-red-800"><strong>Error:</strong> ${message}</p>
            </div>
        `;
    }
    
    function showNoResults(resultsDiv) {
        resultsDiv.innerHTML = `
            <div class="text-center py-8 text-gray-500">
                <div class="text-4xl mb-4">🤔</div>
                <p>No matching skills found for your query</p>
                <p class="text-sm mt-2">Try a different description or check if skills are available in the hub</p>
            </div>
        `;
    }
</script>
