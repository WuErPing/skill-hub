<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="960" height="600" fill="#ffffff"/>
  <text x="480" y="40" font-size="18" font-weight="600" fill="#111827" text-anchor="middle">skill-hub Data Flow</text>
  <text x="480" y="65" font-size="12" font-weight="600" fill="#6b7280" text-anchor="middle">SOURCE LAYER</text>
  <rect x="360" y="80" width="240" height="60" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="480" y="110" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">GitHub / Local Path</text>
  <text x="480" y="128" font-size="11" fill="#6b7280" text-anchor="middle">(URL or directory)</text>
  <text x="480" y="200" font-size="12" font-weight="600" fill="#6b7280" text-anchor="middle">CACHE LAYER</text>
  <rect x="200" y="215" width="560" height="130" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="480" y="232" font-size="11" fill="#9ca3af" text-anchor="middle">~/.skills_repo/</text>
  <rect x="230" y="260" width="180" height="60" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="320" y="285" font-size="13" font-weight="600" fill="#111827" text-anchor="middle">repos/</text>
  <text x="320" y="303" font-size="11" fill="#6b7280" text-anchor="middle">(source code)</text>
  <rect x="550" y="260" width="180" height="60" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="640" y="285" font-size="13" font-weight="600" fill="#111827" text-anchor="middle">mappings/</text>
  <text x="640" y="303" font-size="11" fill="#6b7280" text-anchor="middle">(skill index)</text>
  <text x="480" y="420" font-size="12" font-weight="600" fill="#6b7280" text-anchor="middle">TARGET LAYER</text>
  <rect x="220" y="470" width="200" height="60" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="320" y="495" font-size="13" font-weight="600" fill="#111827" text-anchor="middle">~/.claude/skills/</text>
  <text x="320" y="513" font-size="11" fill="#6b7280" text-anchor="middle">(Target A)</text>
  <rect x="540" y="470" width="200" height="60" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="640" y="495" font-size="13" font-weight="600" fill="#111827" text-anchor="middle">~/.agents/skills/</text>
  <text x="640" y="513" font-size="11" fill="#6b7280" text-anchor="middle">(Target B)</text>
  <path d="M 480,140 L 480,200 L 320,200 L 320,260" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="370" y="188" width="110" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="425" y="200" font-size="11" fill="#2563eb" text-anchor="middle">git clone / scan</text>
  <line x1="410" y1="290" x2="550" y2="290" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="440" y="278" width="84" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="482" y="290" font-size="11" fill="#16a34a" text-anchor="middle">scan SKILL.md</text>
  <path d="M 640,320 L 640,395 L 320,395 L 320,470" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="465" y="383" width="90" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="510" y="395" font-size="11" fill="#2563eb" text-anchor="middle">copy / install</text>
  <line x1="640" y1="320" x2="640" y2="470" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="648" y="388" width="90" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="693" y="400" font-size="11" fill="#2563eb" text-anchor="middle">copy / install</text>
  <g transform="translate(40, 555)">
    <line x1="0" y1="8" x2="25" y2="8" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
    <text x="32" y="12" font-size="11" fill="#6b7280">main flow</text>
    <line x1="0" y1="24" x2="25" y2="24" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <text x="32" y="28" font-size="11" fill="#6b7280">indexing</text>
  </g>
</svg>